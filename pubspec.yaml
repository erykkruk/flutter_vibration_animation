name: flutter_vibration_animation
description: >-
  Comprehensive vibration and haptic feedback for Flutter — Android & iOS.
  Impact, notification, selection, predefined effects, custom waveforms and
  Core Haptics intensity-and-sharpness patterns.
version: 0.1.0

homepage: https://github.com/erykkruk/flutter_vibration_animation
repository: https://github.com/erykkruk/flutter_vibration_animation
issue_tracker: https://github.com/erykkruk/flutter_vibration_animation/issues

topics:
  - vibration
  - haptics
  - feedback
  - haptic-feedback

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.erykkruk.flutter_vibration_animation
        pluginClass: FlutterVibrationAnimationPlugin
      ios:
        pluginClass: FlutterVibrationAnimationPlugin

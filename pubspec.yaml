name: flutter_haptics
description: >-
  Haptic feedback, vibration and animated UI widgets for Flutter — Android &
  iOS. Impact, notification, selection, predefined effects, custom waveforms,
  Core Haptics patterns plus 8 production-ready widgets.
version: 0.1.1

homepage: https://github.com/erykkruk/flutter_vibration_animation
repository: https://github.com/erykkruk/flutter_vibration_animation
issue_tracker: https://github.com/erykkruk/flutter_vibration_animation/issues

topics:
  - haptics
  - vibration
  - haptic-feedback
  - animation
  - widgets

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.erykkruk.flutter_haptics
        pluginClass: FlutterHapticsPlugin
      ios:
        pluginClass: FlutterHapticsPlugin
